# set easier window split keys
bind-key v split-window -h
bind-key x kill-pane
bind-key - split-window -v

# Use Alt-arrow keys to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

set -g history-limit 102400

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off

set -g mouse on

# Set easier window split keys
bind-key v split-window -h
bind -r ^ last-window
bind k select-pane -U
bind j select-pane -D
bind h select-pane -L
bind l select-pane -R

set -g history-limit 102400

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g default-terminal "screen-256color"

setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind P paste-buffer
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Fix ESC delay in vim
set -g escape-time 0

unbind C-b
set -g prefix C-a

bind C-a send-prefix
bind-key o last-window
bind-key -r f run-shell "tmux neww ts"

set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'

bind g new-window -n '' lazygit
bind -r D neww -c "#{pane_current_path}" "n ~/Documents/personal/notes/todo.md"

bind-key -r H run-shell "tmux-sessionizer ~/Projects/"
bind-key -r R run-shell "tmux-sessionizer ~/College/"

bind-key e run-shell session-menu

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'catppuccin/tmux'

set -g @catppuccin_flavour 'mocha'
set -g @catppuccin_window_number_position 'right'
set -g @catppuccin_status_modules_left 'session'
set -g @catppuccin_status_modules_right 'directory user host date_time'
set -g @catppuccin_status_background 'none'
set -g @catppuccin_status_module_bg_color 'default'
set -g @catppuccin_status_session_icon_bg 'default'
set -g @catppuccin_status_session_text_bg 'default'
set -g @catppuccin_status_directory_icon_bg 'default'
set -g @catppuccin_status_directory_text_bg 'default'
set -g @catppuccin_status_user_icon_bg 'default'
set -g @catppuccin_status_user_text_bg 'default'
set -g @catppuccin_status_host_icon_bg 'default'
set -g @catppuccin_status_host_text_bg 'default'
set -g @catppuccin_status_date_time_icon_bg 'default'
set -g @catppuccin_status_date_time_text_bg 'default'
set -g status-style 'bg=default'

set -ga update-environment EDITOR

set -g status-left-length 40 
bind-key N swap-window -t +1 \; next-window
bind-key P swap-window -t -1 \; previous-window

run '~/.config/tmux/plugins/tpm/tpm'

# Override theme to keep status bar transparent
set -g status-style 'bg=default'
set -g status-left-style 'bg=default'
set -g status-right-style 'bg=default'
set -g window-status-style 'bg=default'
set -g window-status-current-style 'bg=default'

# OpenCode-like palette
set -g status-style 'bg=default,fg=#E6E6E6'
set -g message-style 'bg=default,fg=#E6E6E6'
set -g message-command-style 'bg=default,fg=#E6E6E6'
set -g window-status-style 'bg=default,fg=#BDBDBD'
set -g window-status-current-style 'bg=default,fg=#E6E6E6'
set -g window-status-activity-style 'bg=default,fg=#8AB4F8'
set -g window-status-bell-style 'bg=default,fg=#8AB4F8'
set -g pane-border-style 'fg=#A0A0A0'
set -g pane-active-border-style 'fg=#8AB4F8'

# Disable Catppuccin window/status formatting and set custom formats
set -g @catppuccin_window_status_style 'none'
set -g status-left '#[fg=#8AB4F8,bg=default] #S '
set -g status-right '#[fg=#BDBDBD,bg=default] #{pane_current_path} #[fg=#A0A0A0,bg=default] #(whoami)@#H #[fg=#BDBDBD,bg=default] %Y-%m-%d %H:%M '
set -g window-status-format '#[fg=#BDBDBD,bg=default] #I:#W '
set -g window-status-current-format '#[fg=#E6E6E6,bg=default] #I:#W '
set -g window-status-separator ' '
